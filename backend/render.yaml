services:
  - type: web
    name: virtue-foundation-api
    runtime: python
    rootDir: backend
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABRICKS_HOST
        sync: false
      - key: DATABRICKS_TOKEN
        sync: false
      - key: DATABRICKS_HTTP_PATH
        sync: false
      - key: DATABRICKS_CATALOG
        value: virtue_foundation
      - key: DATABRICKS_SCHEMA
        value: ghana
      - key: LLM_ENDPOINT
        sync: false
      - key: EMBED_ENDPOINT
        sync: false
      - key: LLM_MODEL
        value: databricks-meta-llama-3-3-70b-instruct
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: FAISS_INDEX_PATH
        value: ./rag_data/faiss_index.bin
      - key: FAISS_META_PATH
        value: ./rag_data/faiss_metadata.json
      - key: FAISS_INDEX_URL
        sync: false
      - key: FAISS_META_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: API_KEYS
        value: ""
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: AGENT_TIMEOUT_SECONDS
        value: "180"
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
      - key: MLFLOW_TRACKING_URI
        value: databricks
