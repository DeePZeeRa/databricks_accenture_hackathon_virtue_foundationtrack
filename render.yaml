# ============================================================================
# VIRTUE FOUNDATION GHANA IDP - RENDER DEPLOYMENT CONFIG
# ============================================================================
# Deploy FastAPI backend to Render.com free tier

services:
  - type: web
    name: vf-health-ghana-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABRICKS_HOST
        sync: false  # Set in Render dashboard
      - key: DATABRICKS_TOKEN
        sync: false  # Set in Render dashboard (encrypted)
      - key: DATABRICKS_WAREHOUSE_ID
        sync: false  # Set in Render dashboard
      - key: MLFLOW_TRACKING_URI
        value: databricks
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health
    autoDeploy: true

# Render Free Tier Limitations:
# - Sleeps after 15 minutes of inactivity
# - 750 hours/month free compute
# - Perfect for demo/hackathon projects

# To deploy:
# 1. Push code to GitHub
# 2. Connect Render to your GitHub repo
# 3. Set environment variables in Render dashboard
# 4. Deploy will happen automatically